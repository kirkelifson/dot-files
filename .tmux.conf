# --- Prefix ---
set-option -g prefix C-a
bind-key C-a last-window
bind-key a send-prefix # <C-a> a <command> to send commands to a nested tmux session
bind r source-file ~/.tmux.conf \; display-message "Config reloaded..."

# --- General ---
set -g mouse on
set -g base-index 1              # Start window numbering at 1
setw -g pane-base-index 1        # Start pane numbering at 1
set-option -g renumber-windows on
set -s escape-time 0             # Faster key repetition
setw -g aggressive-resize on     # Maximize window size for connected client
set -g history-limit 50000       # Scrollback buffer
set -g focus-events on           # Let vim detect focus changes (for autoread)

# --- Terminal & Colors ---
set -g default-terminal "tmux-256color"
set -sa terminal-features ',xterm-ghostty:RGB'
set -sa terminal-overrides ',xterm-256color:RGB'

# --- Splitting ---
bind | split-window -h -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"

# New windows open in current path
bind c new-window -c "#{pane_current_path}"

# --- Pane Navigation (hjkl) ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Pane Resizing (HJKL) ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Vi Copy Mode ---
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Platform-aware yank to system clipboard
if-shell "uname -s | grep -q Darwin" \
  "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'" \
  "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'"

# --- Status Bar ---
set -g status-interval 5
set -g status-justify centre
set -g status-left-length 40
set -g status-right-length 60

set -g status-style fg=white,bg=colour237
set -g status-left '#[fg=colour73,bold] #S #[fg=white,nobold]| #(whoami)@#h'
set -g status-right '#[fg=colour248]%H:%M #[fg=white]| #[fg=colour248]%b %d'

# Window titles
setw -g window-status-format '#[fg=colour248] #I:#W '
setw -g window-status-current-format '#[fg=colour73,bold] #I:#W '

# Pane borders
set -g pane-border-style fg=colour237
set -g pane-active-border-style fg=colour73

# --- Sessionizer ---
bind f run-shell "tmux new-window tmux-sessionizer"

# --- Shell ---
set-option -g default-shell $SHELL
set -g default-command $SHELL
